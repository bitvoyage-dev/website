<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#fdf6e2;        /* サイトの --paper-image-frame と一致 */
    --ink:#3a342c;          /* --navy-900 / --ink-900 */
    --ink-500:#6b665c;
    --gold:#c49a3c;         /* --yellow-500 */
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{background:#fff;}
  .ec{
    width:1200px;height:630px;position:relative;overflow:hidden;
    background-color:var(--paper);
    background-image:
      linear-gradient(rgba(58,52,44,0.06) 1px,transparent 1px),
      linear-gradient(90deg,rgba(58,52,44,0.06) 1px,transparent 1px);
    background-size:40px 40px;
    font-family:"Zen Kaku Gothic New",sans-serif;
    color:var(--ink);
    display:flex;align-items:center;
  }
  /* 左：タイトル（実幅に合わせて可変＝短い見出しほど右の図が大きくなる） */
  .left{flex:0 0 auto;max-width:77%;padding:0 28px 0 60px;}
  .eyebrow{font-weight:700;font-size:22px;letter-spacing:.22em;color:var(--gold);margin-bottom:30px;}
  .title{font-weight:900;font-size:82px;line-height:1.5;letter-spacing:.002em;white-space:nowrap;}
  .title .l2,.title .l3{display:block;white-space:nowrap;}
  /* マーカー帯（半透明マスタード） */
  .mk{
    background:linear-gradient(transparent 56%, rgba(196,154,60,.55) 56%, rgba(196,154,60,.55) 94%, transparent 94%);
    padding:0 .04em;
  }
  /* 右：図（左の残り幅いっぱいに拡大） */
  .right{flex:1 1 auto;min-width:0;height:100%;display:flex;align-items:center;justify-content:center;padding:26px 44px;}
  .right img{max-width:100%;max-height:84%;object-fit:contain;}
  /* 署名 */
  .brand{position:absolute;left:72px;bottom:34px;font-weight:700;font-size:18px;letter-spacing:.04em;color:var(--ink-500);}
</style>
</head>
<body>
  <div class="ec">
    <div class="left">
      <div class="eyebrow">BITVOYAGE COLUMN</div>
      <div class="title" id="title"></div>
    </div>
    <div class="right"><img id="fig" alt=""></div>
    <div class="brand">bitvoyage.co.jp</div>
  </div>
<script>
  const DATA = {
    "what-is-cloud": { l1:"クラウドって、", l2:"<span class='mk'>結局何？</span>", fig:"figures/t-what-is-cloud.png" },
    "where-to-start": { l1:"業務改善は、", l2:"<span class='mk'>どこから</span>", l3:"手をつけるか", fig:"figures/t-where-to-start.png" },
    "duplicate-entry": { l1:"同じ情報を、", l2:"<span class='mk'>何度も</span>", l3:"入力していませんか", fig:"figures/t-duplicate-entry.png" },
    "fax-order-entry": { l1:"FAXや電話の注文を、", l2:"<span class='mk'>手で入力</span>", l3:"していませんか", fig:"figures/t-fax-order-entry.png" },
    "customer-info-scattered": { l1:"お客様の情報、", l2:"<span class='mk'>あちこちに</span>", l3:"散らばっていませんか", fig:"figures/t-customer-info-scattered.png" },
    "manual-work-reduction": { l1:"手作業が", l2:"<span class='mk'>減らない</span>", l3:"理由", fig:"figures/t-manual-work-reduction.png" },
    "business-clog-identify": { l1:"忙しいのに", l2:"<span class='mk'>進まない会社</span>", l3:"の共通点", fig:"figures/t-business-clog-identify.png" },
  };
  const slug = new URLSearchParams(location.search).get("slug") || "where-to-start";
  const d = DATA[slug] || DATA["where-to-start"];
  let html = d.l1 + "<span class='l2'>" + d.l2 + "</span>";
  if (d.l3) { html += "<span class='l3'>" + d.l3 + "</span>"; document.querySelector(".ec").classList.add("three"); }
  document.getElementById("title").innerHTML = html;
  document.getElementById("fig").src = d.fig;
</script>
</body>
</html>
